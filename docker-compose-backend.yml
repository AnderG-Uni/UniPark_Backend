services:
  unipark-backend:
    build: .
    container_name: unipark_api
    restart: always
    # Aquí pasamos el .env de forma segura al contenedor en runtime
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/app/certs:ro
      - ./logs:/app/logs
      - ./src/assets/vehiculos:/app/src/assets/vehiculos